name: sbom

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag to generate SBOM for (defaults to latest release on dispatch)
        required: false
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.release_tag || github.ref }}
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Install cyclonedx-gomod
        run: go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@v1.7.0

      - name: Generate SBOM
        run: cyclonedx-gomod mod -licenses -json -output sbom.cdx.json

      - name: Upload SBOM as release asset
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" sbom.cdx.json --clobber

      - name: Upload SBOM as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.event.release.tag_name || inputs.release_tag || github.sha }}
          path: sbom.cdx.json
          retention-days: 90
