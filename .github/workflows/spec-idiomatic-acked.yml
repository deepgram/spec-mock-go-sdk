name: spec-idiomatic-acked

on:
  pull_request:
    types: [labeled, unlabeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  evaluate:
    name: Re-evaluate breaking-acked status check
    if: >-
      github.repository == 'deepgram/spec-mock-go-sdk'
      && (github.event.label.name == 'regen/breaking-acked'
          || github.event.label.name == 'regen/breaking-unavoidable')
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      pull-requests: read
      statuses: write

    steps:
      - name: Re-evaluate spec-idiomatic/breaking-acked
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          sha="${{ github.event.pull_request.head.sha }}"
          labels=$(gh pr view ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --json labels --jq '.labels[].name' || echo "")

          if ! echo "$labels" | grep -qx "regen/breaking-unavoidable"; then
            state="success"
            desc="no unavoidable breaking changes label on PR"
          elif echo "$labels" | grep -qx "regen/breaking-acked"; then
            state="success"
            desc="unavoidable breaking changes acked"
          else
            state="failure"
            desc="unavoidable breaking changes require regen/breaking-acked"
          fi

          gh api -X POST "repos/${{ github.repository }}/statuses/$sha" \
            -f state="$state" \
            -f context="spec-idiomatic/breaking-acked" \
            -f description="$desc"
