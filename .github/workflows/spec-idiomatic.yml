name: spec-idiomatic

on:
  pull_request:
    paths:
      - "api/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regenerate-facade:
    name: regenerate idiomatic facade
    if: github.repository == 'deepgram/spec-mock-go-sdk'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Materialise before/after api snapshots
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/api-before" "${RUNNER_TEMP}/api-after"
          git archive "${{ github.event.pull_request.base.sha }}" api \
            | tar -x -C "${RUNNER_TEMP}/api-before/"
          cp -r api/. "${RUNNER_TEMP}/api-after/api/"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Checkout spec-idiomatic runner
        uses: actions/checkout@v4
        with:
          repository: deepgram/spec-idiomatic
          path: .spec-idiomatic
          ref: main
          token: ${{ secrets.TEMP_SPEC_TOKEN }}

      - name: Build runner
        working-directory: .spec-idiomatic
        run: |
          set -euo pipefail
          gradle --quiet build -x test
          (cd parsers/go && go build -o parser .)

      - name: Capture PR body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: printf '%s' "$PR_BODY" > "${RUNNER_TEMP}/pr-body.md"

      - name: Run spec-idiomatic
        working-directory: .spec-idiomatic
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SPEC_IDIOMATIC_GO_PARSER: ${{ github.workspace }}/.spec-idiomatic/parsers/go/parser
        run: |
          set -euo pipefail
          gradle --quiet run --args="\
            --before-api ${RUNNER_TEMP}/api-before/api \
            --after-api  ${RUNNER_TEMP}/api-after/api \
            --facade-dir ${{ github.workspace }}/pkg \
            --language   go \
            --pr-body    ${RUNNER_TEMP}/pr-body.md \
            --apply \
            --max-retries 3"

      - name: Commit facade updates
        run: |
          set -euo pipefail
          if [[ -z "$(git status --porcelain pkg/ BREAKING_CHANGES.md 2>/dev/null)" ]]; then
            echo "no facade changes; nothing to commit"
            exit 0
          fi
          git config user.name "spec-idiomatic-bot"
          git config user.email "spec-idiomatic-bot@users.noreply.github.com"
          git add pkg/ BREAKING_CHANGES.md 2>/dev/null || git add pkg/
          git commit -m "chore(facade): regenerate idiomatic layer for api/ changes"
          git push origin HEAD:${{ github.head_ref }}
