name: test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  go-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Check gofmt
        run: |
          diff=$(gofmt -d $(git ls-files 'api/**/*.go' 'pkg/**/*.go'))
          if [ -n "$diff" ]; then
            echo "$diff"
            echo "gofmt drift detected — run 'gofmt -w ./api/... ./pkg/...' locally"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test -race -count=1 ./...
